# Semantic Domains for Quranic Arabic Roots
# Based on al-Isfahani's categorization in al-Mufradat fi Gharib al-Quran
# and classical Islamic lexicographic tradition
#
# Each domain groups roots that share a core semantic field.
# Sources: al-Isfahani, Ibn Faris (Maqayis al-Lughah), Lane's Lexicon

divinity:
  arabic: الوهية
  description: "God's names, attributes, and divine nature"
  roots:
    - "أله"    # God, divinity
    - "ربب"    # lord, sustainer
    - "قدس"    # holy, sacred
    - "سبح"    # glorify, exalt
    - "حمد"    # praise
    - "عظم"    # great, magnificent
    - "عزز"    # mighty, powerful
    - "جبر"    # compel, almighty
    - "وحد"    # one, unique
    - "صمد"    # eternal, self-sufficient
    - "بدع"    # originate, create anew
    - "علو"    # exalted, most high

mercy:
  arabic: رحمة
  description: "Compassion, mercy, divine nurturing"
  roots:
    - "رحم"    # mercy, compassion, womb
    - "رأف"    # kindness, clemency
    - "حنن"    # tenderness
    - "عطف"    # inclination, sympathy
    - "لطف"    # gentle, subtle
    - "برر"    # righteous, kind
    - "حلم"    # forbearance, clemency
    - "عفو"    # pardon, efface
    - "غفر"    # forgive, cover

knowledge:
