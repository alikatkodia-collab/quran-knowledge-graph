llm:
  model: claude-sonnet-4-5
  max_tokens: 3072
  temperature: 1.0
embedding:
  model: all-MiniLM-L6-v2
  dimensions: 384
retrieval:
  semantic_search:
    default_top_k: 35
    max_top_k: 80
  traverse_topic:
    seed_limit: 15
    hop1_limit: 40
    hop2_limit: 60
    max_hops: 2
  get_verse:
    keyword_limit: 14
    neighbour_limit: 16
    shared_kw_limit: 5
  find_path:
    max_depth: 6
    bridge_kw_limit: 5
  explore_surah:
    cross_surah_limit: 10
  search_keyword:
    fuzzy_prefix_len: 4
    fuzzy_limit: 8
visualisation:
  search_keyword_max_nodes: 15
  get_verse_max_connected: 8
  get_verse_max_kw_per_neighbour: 3
  explore_surah_max_verses: 30
  find_path_max_bridge_kw: 3
system_prompt: prompts/system_prompt.txt
arabic:
  source_file: data/quran-arabic-raw.json
  morphology_file: data/quran-morphology.txt
  reading: hafs
  morphology_backend: corpus
  root_min_verses: 2
  root_max_verses: 500
  root_stoplist:
  - قول
  - كون
  - أله
  related_by_root_max_edges: 12
  search_arabic_root:
    fuzzy_limit: 8
  compare_arabic_usage:
    max_forms_per_root: 20
    max_verses_per_form: 10
scoring:
  related_to_min_score: 0.3
  mentions_min_score: 0.04
evaluation:
  test_dataset: test_dataset.json
  metrics:
  - citation_recall
  - citation_precision
  - grounding_rate
  - answer_relevance
  composite_weights:
    citation_recall: 0.35
    citation_precision: 0.25
    grounding_rate: 0.3
    answer_relevance: 0.1
