- id: concrete-005
  bucket: CONCRETE
  question: "Who is Dhul-Qarnayn?"
  asserts:
    cites_must_include: ["18:83"]
    tools_used_must_include: ["hybrid_search"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["Qarnayn"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.35
    tool_path_correctness: 0.3
    framing_appropriateness: 0.1
  notes: |
    Named-entity sub-shape (proper noun) -> hybrid_search pin.
    Single canonical location: 18:83-98 in Surah Al-Kahf — the
    only place Dhul-Qarnayn is named.
    Substring "Qarnayn" matches "Dhul-Qarnayn" / "Dhu al-Qarnayn"
    / "Zul-Qarnayn" via prefix.
    Anchor candidates considered: 18:83 (opening of the narrative),
    18:86 (the first journey), 18:96 (the iron-and-copper barrier).
    Picked 18:83 as the opening.
    Failure mode: agent imports extra-Quranic Alexander-the-Great
    identification without flagging the Quranic ambiguity.
  added: 2026-05-17
  added_by: operator

- id: concrete-006
  bucket: CONCRETE
  question: "Tell the story of the Cave (Ashab al-Kahf) as the Quran presents it."
  asserts:
    cites_must_include: ["18:9"]
    tools_used_must_include: ["hybrid_search"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["Cave"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.35
    tool_path_correctness: 0.3
    framing_appropriateness: 0.1
  notes: |
    Named-entity sub-shape (named narrative) -> hybrid_search pin.
    Single canonical location: 18:9-26 in Surah Al-Kahf.
    Anchor candidates considered: 18:9 (opening), 18:13 (the
    young men sought refuge in the Cave), 18:21 (their numbers
    debate). Picked 18:9 as the opening.
    Failure mode: agent spiritualises the Cave narrative into
    abstract themes (faith / refuge / sleep-as-trial) without
    grounding in the specific verses; or imports the Christian
    "Seven Sleepers of Ephesus" tradition uncritically.
  added: 2026-05-17
  added_by: operator

- id: concrete-007
  bucket: CONCRETE
  question: "How is Pharaoh depicted across the Quran?"
  asserts:
    cites_must_include: ["28:38"]
    tools_used_must_include: ["hybrid_search"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["Pharaoh"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.35
    tool_path_correctness: 0.3
    framing_appropriateness: 0.1
  notes: |
    Named-entity sub-shape (proper noun "Pharaoh") -> hybrid_search
    pin. Recurring antagonist across many surahs (7, 10, 11, 20,
    26, 28, 40, 43, 79, etc.).
    Anchor candidates considered: 28:38 (Khalifa: Pharaoh's
    self-deification: "I am your only god" — iconic and Khalifa-
    distinctive in rendering), 79:24 ("I am your Lord, most high"),
    7:103 (the Moses-vs-Pharaoh confrontation opens). Picked
    28:38 because Pharaoh's self-deification is the moral hinge
    of the Quranic portrayal.
    Phase 4d any_of candidate: substring "Pharaoh" vs "Fir'awn"
    (transliterated form) — Khalifa uses "Pharaoh."
  added: 2026-05-17
  added_by: operator
