# Eval v2 — STRUCTURED bucket (4 questions).
#
# Tests questions with a structural / numerical / Code-19 anchor that
# the user genuinely needs the graph to answer. Failure mode: agent
# confabulates from training data instead of querying the graph's
# structural metadata. Heavy citation_accuracy weighting since the
# right answer is precise.
#
# Questions 3-4 (Meccan / Medinan) were initially scaffolded as
# forcing-function failures pending the metadata backfill. The
# backfill landed on main (commits 9e313eb data: backfill +
# 43d7afe docs); Sura nodes now carry revelation_location /
# revelation_order / revelation_location_source. These questions
# are now real measurement signal, not forcing functions, and
# their asserts pin run_cypher as the expected tool path.

- id: structured-001
  bucket: STRUCTURED
  question: "How many times does the letter Qaf appear in Surah Qaf, and how does this relate to the Code-19 system?"
  asserts:
    cites_must_include: ["50:1"]
    tools_used_must_include: ["get_code19_features"]
    tools_used_must_not_include: []
    answer_substring_required: ["57", "19"]
  rubric_weights:
    citation_accuracy: 0.5
    answer_completeness: 0.2
    tool_path_correctness: 0.2
    framing_appropriateness: 0.1
  notes: |
    Code-19 sub-shape. Anchor 50:1 (Surah Qaf opens with the
    single letter Qaf). Pin requires get_code19_features per
    system-prompt mandate ("For QUESTIONS ABOUT THE NUMBER 19,
    MATHEMATICAL MIRACLE, MYSTERIOUS LETTERS, or letter counts,
    call get_code19_features"). Two-substring gate: "57" tests
    the count claim (Khalifa: Qaf appears 57 times = 19 x 3 in
    Surah 50); "19" tests the Code-19 connection. Both required.
    run_cypher NOT forbidden — agent could legitimately follow
    up the get_code19_features call with a Cypher cross-check.
    Failure mode: agent confabulates the count from training
    data or skips the Code-19 connection.
  added: 2026-05-17
  added_by: operator

- id: structured-002
  bucket: STRUCTURED
  question: "Which surahs open with mysterious letters (muqatta'at), and what patterns connect them?"
  asserts:
    cites_must_include: ["2:1"]
    tools_used_must_include: ["run_cypher"]
    tools_used_must_not_include: []
    answer_substring_required: ["29"]
  rubric_weights:
    citation_accuracy: 0.5
    answer_completeness: 0.2
    tool_path_correctness: 0.2
    framing_appropriateness: 0.1
  notes: |
    Mysterious-letters sub-shape. Anchor 2:1 ("A. L. M." — the
    first muqatta'at occurrence in canonical order). Pin requires
    run_cypher because the right tool is querying
    Sura.mysterious_letters across all 114 surahs — no specialised
    tool surfaces this enumeration directly. get_code19_features
    is also relevant (Khalifa connects muqatta'at to Code-19 via
    letter counts) but not pinned because the question's primary
    ask is the enumeration, not the arithmetic.
    Substring "29" pins the canonical count of muqatta'at surahs —
    failure to surface this number indicates the agent didn't
    actually enumerate.
    Failure mode: agent lists from training data, misses the long
    tail (the rarer ones — Maryam's Kaf Ha Ya Ain Sad, etc.) or
    confabulates the count.
  added: 2026-05-17
  added_by: operator

- id: structured-003
  bucket: STRUCTURED
  question: "Which surahs are Meccan and which are Medinan?"
  asserts:
    cites_must_include: []
    tools_used_must_include: ["run_cypher"]
    tools_used_must_not_include: []
    answer_substring_required: ["Meccan", "Medinan", "86", "28"]
  rubric_weights:
    citation_accuracy: 0.5
    answer_completeness: 0.2
    tool_path_correctness: 0.2
    framing_appropriateness: 0.1
  notes: |
    Meccan/Medinan-list sub-shape. The data backfill landed on main
    (revelation_location / revelation_order / revelation_location_source
    are now on every Sura node). This is real measurement signal,
    not a forcing-function failure.
    Pin run_cypher because the right tool is querying
    Sura.revelation_location across all 114 nodes — no specialised
    tool surfaces this enumeration directly.
    Four-substring gate ("Meccan", "Medinan", "86", "28") — all
    required. Hedging-to-approximate ("about 90 Meccan, 30 Medinan")
    is exactly the failure mode the count substrings catch. Data
    is precise per the Egyptian standard; the agent has query
    access and should report exact counts.
    Phase 4d any_of candidate: substring "Makki" / "Madani"
    (alternate transliterations) — Khalifa uses "Meccan" / "Medinan"
    but agent training data may surface the alternates.
  added: 2026-05-17
  added_by: operator

