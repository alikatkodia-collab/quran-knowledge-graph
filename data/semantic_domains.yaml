    - "فقه"    # understand deeply
    - "حكم"    # wisdom, judgment
    - "فهم"    # comprehend
    - "عقل"    # reason, intellect
    - "درس"    # study
    - "فكر"    # think, reflect
    - "ذكر"    # remember, mention
    - "لبب"    # core understanding
    - "بصر"    # insight, vision
    - "شعر"    # perceive, feel
    - "خبر"    # know by experience

faith:
