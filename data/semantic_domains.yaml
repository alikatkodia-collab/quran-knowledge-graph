    - "يقن"    # certainty
    - "صدق"    # truth, sincerity
    - "وثق"    # trust, rely
    - "توب"    # repent, return
    - "سلم"    # submit, peace, Islam
    - "تقو"    # God-consciousness, piety
    - "خشع"    # humility, awe
    - "خوف"    # fear (of God)
    - "رجو"    # hope
    - "وكل"    # trust, rely on God

