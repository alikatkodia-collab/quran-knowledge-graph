<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran Knowledge Graph</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #060a14;
      color: #cbd5e1;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      padding: 10px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      background: #0a0f1a;
    }
    header h1 { font-size: 1.05em; font-weight: 700; color: #10b981; white-space: nowrap; }
    header p  { font-size: 0.75em; color: #334155; flex: 1; }
    #header-tabs { display: flex; gap: 4px; }
    #header-tabs .tab {
      padding: 4px 14px; border-radius: 6px; font-size: 0.76em; font-weight: 600;
      color: #64748b; text-decoration: none; border: 1px solid transparent;
      transition: all 0.15s;
    }
    #header-tabs .tab:hover { color: #94a3b8; border-color: #1e293b; }
    #header-tabs .tab.active { color: #10b981; border-color: #10b981; background: rgba(16,185,129,0.08); }

    /* ── main split ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── chat panel (LEFT) ── */
    #chat-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e293b;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    /* bubbles */
    .row-user      { display: flex; justify-content: flex-end; }
    .row-assistant { display: flex; justify-content: flex-start; }

    .bubble-user {
      background: #047857;
      color: #ecfdf5;
      padding: 9px 14px;
      border-radius: 16px 16px 4px 16px;
      max-width: 80%;
      font-size: 0.88em;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble-assistant {
      background: #0f1a2e;
      border: 1px solid #1e293b;
      color: #cbd5e1;
      padding: 12px 15px;
      border-radius: 4px 16px 16px 16px;
      max-width: 95%;
      font-size: 0.85em;
      line-height: 1.65;
      word-break: break-word;
    }

    .thinking {
      color: #1e3a5f;
      font-style: italic;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* prose */
    .prose p               { margin-bottom: 0.45em; }
    .prose p:last-child    { margin-bottom: 0; }
    .prose h2,.prose h3    { color: #f1f5f9; font-weight: 600; margin: 0.6em 0 0.2em; font-size: 1em; }
    .prose ul,.prose ol    { padding-left: 1.4em; margin-bottom: 0.4em; }
    .prose li              { margin-bottom: 0.15em; }
    .prose strong          { color: #e2e8f0; }
    .prose em              { color: #64748b; }
    .prose code            { background: #0a0f1a; color: #7dd3fc; padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.87em; font-family: monospace; }
    .prose blockquote      { border-left: 2px solid #10b981; padding-left: 8px; color: #64748b; margin: 0.4em 0; }
    .prose a               { color: #34d399; }

    /* tool blocks */
    .tool-block {
      background: #060a14;
      border: 1px solid #1a2540;
      border-radius: 5px;
      padding: 5px 9px;
      margin: 6px 0;
    }
    .tool-block > summary {
      cursor: pointer; color: #1e3a5f; font-size: 0.78em;
      font-style: italic; list-style: none; user-select: none;
    }
    .tool-block > summary::-webkit-details-marker { display: none; }
    .tool-block > summary::before { content: '> '; }
    .tool-block[open] > summary::before { content: 'v '; }
    .tool-block > summary:hover { color: #334155; }
    .tool-result { color: #334155; font-size: 0.78em; padding-top: 3px; padding-left: 12px; }

    /* etymology panels */
    .etym-panel {
      background: linear-gradient(135deg, #0c1222 0%, #111827 100%);
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 8px 0;
      font-size: 0.88em;
      line-height: 1.6;
    }
    .etym-panel-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e3a5f;
    }
    .etym-panel-header .ar-main {
      font-family: 'Amiri', 'Traditional Arabic', serif;
      font-size: 1.6em;
      color: #e2e8f0;
      direction: rtl;
    }
    .etym-panel-header .en-gloss {
      color: #94a3b8;
      font-size: 0.95em;
    }
    .etym-tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.78em;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .etym-tag-root { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .etym-tag-pattern { background: rgba(251,146,60,0.15); color: #fb923c; }
    .etym-tag-pos { background: rgba(99,102,241,0.15); color: #818cf8; }
    .etym-tag-domain { background: rgba(244,114,182,0.15); color: #f472b6; }
    .etym-tag-count { background: rgba(16,185,129,0.12); color: #10b981; }
    .etym-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(30,58,95,0.4);
    }
    .etym-row:last-child { border-bottom: none; }
    .etym-row .ar {
      font-family: 'Amiri', 'Traditional Arabic', serif;
      font-size: 1.2em;
      color: #e2e8f0;
      direction: rtl;
      min-width: 80px;
      text-align: right;
      cursor: pointer;
    }
    .etym-row .ar:hover { color: #7dd3fc; }
    .etym-row .gloss { color: #94a3b8; flex: 1; }
    .etym-row .count { color: #475569; font-size: 0.85em; white-space: nowrap; }
    .etym-row .vref-link {
      color: #10b981; cursor: pointer; font-size: 0.85em;
      text-decoration: underline dotted; margin-left: 4px;
    }
    .etym-row .vref-link:hover { color: #6ee7b7; }
    .etym-interlinear {
      display: flex;
      gap: 0;
      direction: rtl;
      overflow-x: auto;
      padding: 8px 0;
    }
    .etym-word-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 10px;
      border-left: 1px solid rgba(30,58,95,0.3);
      min-width: 60px;
      cursor: pointer;
    }
    .etym-word-col:last-child { border-left: none; }
    .etym-word-col:hover { background: rgba(125,211,252,0.08); border-radius: 6px; }
    .etym-word-col .w-ar {
      font-family: 'Amiri', 'Traditional Arabic', serif;
      font-size: 1.4em;
      color: #e2e8f0;
      line-height: 1.8;
    }
    .etym-word-col .w-gloss { color: #94a3b8; font-size: 0.78em; }
    .etym-word-col .w-root { color: #f59e0b; font-size: 0.72em; font-family: 'Amiri', serif; }
    .etym-word-col .w-pos { color: #475569; font-size: 0.68em; text-transform: uppercase; }
    .etym-sense {
      padding: 6px 0;
      border-bottom: 1px solid rgba(30,58,95,0.3);
    }
    .etym-sense:last-child { border-bottom: none; }
    .etym-sense-num { color: #f59e0b; font-weight: 700; margin-right: 6px; }
    .etym-sense-meaning { color: #e2e8f0; }
    .etym-sense-meaning-ar {
      font-family: 'Amiri', serif; color: #94a3b8;
      direction: rtl; display: inline; margin-right: 8px;
    }
    .etym-sense-verses { margin-top: 3px; font-size: 0.85em; }

    /* verse refs */
    .vref {
      color: #10b981; font-weight: 700; cursor: help;
      border-bottom: 1px dotted #059669;
    }
    .vref:hover { color: #34d399; }

    /* examples */
    #examples {
      padding: 0 14px 8px;
      display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0;
    }
    .ex-btn {
      background: #0a0f1a; border: 1px solid #1e293b; color: #334155;
      font-size: 0.72em; padding: 4px 10px; border-radius: 20px;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .ex-btn:hover { background: #1e293b; color: #94a3b8; }

    /* input */
    #input-area { padding: 0 14px 14px; display: flex; gap: 7px; flex-shrink: 0; }
    #input {
      flex: 1; background: #0f1a2e; border: 1px solid #1e293b;
      color: #f1f5f9; padding: 10px 14px; border-radius: 10px;
      font-size: 0.88em; font-family: inherit; outline: none;
    }
    #input:focus      { border-color: #10b981; }
    #input::placeholder { color: #1e3a5f; }

    #send-btn {
      background: #047857; color: white; border: none;
      padding: 10px 18px; border-radius: 10px; font-size: 0.88em;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
      white-space: nowrap; font-family: inherit;
    }
    #send-btn:hover:not(:disabled) { background: #10b981; }
    #send-btn:disabled { background: #0a0f1a; color: #1e293b; cursor: not-allowed; }

    /* tooltip */
    #tooltip {
      position: fixed;
      background: #0f1a2e; color: #cbd5e1; padding: 10px 14px;
      border-radius: 9px; font-size: 0.81em; font-style: italic;
      line-height: 1.55; max-width: 340px; z-index: 9999;
      pointer-events: none; box-shadow: 0 8px 28px rgba(0,0,0,0.7);
      border: 1px solid #1e293b; display: none;
    }
    #tooltip-ref {
      font-size: 0.75em; color: #10b981; font-weight: 700;
      font-style: normal; display: block; margin-bottom: 4px;
    }
    #tooltip-arabic {
      font-family: 'Amiri', 'Traditional Arabic', serif;
      direction: rtl; text-align: right; font-size: 1.05em;
      line-height: 1.9; color: #e2e8f0; font-style: normal;
      margin-bottom: 6px; border-bottom: 1px solid #1e293b;
      padding-bottom: 6px;
    }
    #tooltip-arabic:empty { display: none; }
    .arabic-text {
      font-family: 'Amiri', 'Traditional Arabic', serif;
      direction: rtl; text-align: right; font-size: 1.05em;
      line-height: 1.9; color: #e2e8f0;
    }

    /* ── graph panel (RIGHT) ── */
    #graph-panel {
      flex: 0 0 60%;
      position: relative;
      overflow: hidden;
      background: #060a14;
    }
    #graph-panel canvas { display: block; }

    /* node info card */
    #node-info {
      position: absolute;
      bottom: 16px; left: 16px; right: 16px;
      background: rgba(10, 15, 26, 0.92);
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 11px 15px;
      backdrop-filter: blur(6px);
      font-size: 0.82em;
      display: none;
      max-height: 140px;
      overflow-y: auto;
    }
    #node-info-title {
      color: #10b981;
      font-weight: 700;
      font-size: 0.9em;
      margin-bottom: 5px;
    }
    #node-info-body { color: #94a3b8; line-height: 1.5; font-style: italic; }
    #node-info-close {
      position: absolute;
      top: 8px; right: 10px;
      color: #334155;
      cursor: pointer;
      font-size: 1.1em;
      line-height: 1;
    }
    #node-info-close:hover { color: #64748b; }

    /* graph legend + WASD hint */
    #graph-legend {
      position: absolute;
      top: 12px; left: 12px;
      font-size: 0.7em;
      color: #334155;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #wasd-hint {
      position: absolute;
      bottom: 16px; right: 16px;
      font-size: 0.68em;
      color: #1e293b;
      pointer-events: none;
      text-align: right;
      line-height: 1.6;
    }

    #clear-graph-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: rgba(15, 26, 46, 0.85);
      border: 1px solid #1e293b;
      color: #64748b;
      font-size: 0.72em;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    #clear-graph-btn:hover { border-color: #334155; color: #94a3b8; }

    /* loading bar */
    #graph-loading {
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #1e3a5f; font-size: 0.85em; text-align: center;
    }
  </style>
</head>
<body>
  <div id="app" style="display:flex;flex-direction:column;height:100dvh;">
    <header>
      <h1>Quran Knowledge Graph</h1>
      <p>6,236 verses on the globe &nbsp;|&nbsp; Connections light up as Claude explores &nbsp;|&nbsp; WASD to fly &nbsp;|&nbsp; Drag to orbit &nbsp;|&nbsp; Scroll to zoom</p>
    </header>
    <div id="main">
      <!-- CHAT on LEFT -->
      <div id="chat-panel">
        <div id="messages"></div>
        <div id="examples"></div>
        <div id="input-area">
          <input id="input" type="text" placeholder="Ask about the Quran..." autocomplete="off">
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
      <!-- GRAPH on RIGHT -->
      <div id="graph-panel">
        <div id="graph-loading">Loading 6,346 verses...</div>
        <div id="graph-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#0f4c3a"></div><span>Verse (idle)</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#6ee7b7"></div><span>Verse (active)</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><span>Keyword</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div><span>Arabic Root</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div><span>Lemma</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#fb923c"></div><span>Pattern</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div><span>Semantic Domain</span></div>
        </div>
        <button id="clear-graph-btn" onclick="clearGraph()">Clear connections</button>
        <div id="wasd-hint">W/S — forward/back<br>A/D — strafe<br>Q/E — up/down</div>
        <div id="node-info">
          <span id="node-info-close" onclick="document.getElementById('node-info').style.display='none'">x</span>
          <div id="node-info-title"></div>
          <div id="node-info-body"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tooltip"><span id="tooltip-ref"></span><div id="tooltip-arabic"></div><span id="tooltip-text"></span></div>

  <script>
    // ── marked config ────────────────────────────────────────────────────────────
    marked.use({ breaks: true, gfm: true });

    // ── examples ─────────────────────────────────────────────────────────────────
    const EXAMPLES = [
      "What does the Quran say about the covenant with Abraham?",
      "What is the significance of the number 19?",
      "How are prayer and remembrance connected?",
      "Tell me about paradise",
      "Tell me about forgiveness",
      "List all the prayers and instances when people ask God for something in the Quran",
    ];
    const examplesEl = document.getElementById('examples');
    EXAMPLES.forEach(ex => {
      const btn = document.createElement('button');
      btn.className = 'ex-btn'; btn.textContent = ex;
      btn.onclick = () => { document.getElementById('input').value = ex; sendMessage(); };
      examplesEl.appendChild(btn);
    });

    // ════════════════════════════════════════════════════════════════════════════
    // 3D GRAPH
    // ════════════════════════════════════════════════════════════════════════════
    const graphPanel = document.getElementById('graph-panel');

    // ── colour helpers ───────────────────────────────────────────────────────────
    const C_VERSE_ACTIVE   = new THREE.Color('#6ee7b7');
    const C_VERSE_CONV     = new THREE.Color('#0d9488');   // in conversation, not active
    const C_VERSE_IDLE     = new THREE.Color('#0f4c3a');   // all other verses (dim)
    const C_KEYWORD_ACTIVE = new THREE.Color('#fde68a');
    const C_KEYWORD_IDLE   = new THREE.Color('#d97706');
    const C_ARABIC_ROOT    = new THREE.Color('#f59e0b');   // amber for Arabic root nodes
    const C_ARABIC_FORM    = new THREE.Color('#d97706');   // darker amber for derived forms
    const C_LEMMA          = new THREE.Color('#c084fc');   // purple for lemma nodes
    const C_MORPH_PATTERN  = new THREE.Color('#fb923c');   // orange for pattern nodes
    const C_SEMANTIC_DOM   = new THREE.Color('#f472b6');   // pink for semantic domain nodes

    function nodeBaseColor(node) {
      if (node.type === 'arabicRoot') return C_ARABIC_ROOT;
      if (node.type === 'arabicForm') return C_ARABIC_FORM;
      if (node.type === 'lemma') return C_LEMMA;
      if (node.type === 'morphPattern') return C_MORPH_PATTERN;
      if (node.type === 'semanticDomain') return C_SEMANTIC_DOM;
      if (node.type === 'keyword') return node.active ? C_KEYWORD_ACTIVE : C_KEYWORD_IDLE;
      if (node.active)       return C_VERSE_ACTIVE;
      if (node.inConv)       return C_VERSE_CONV;
      return C_VERSE_IDLE;
    }

    // ── sprite factory ───────────────────────────────────────────────────────────
    function makeSprite(text, type) {
      const w = 256, h = 52;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.font = 'bold 24px monospace';
      ctx.fillStyle = type === 'keyword' ? '#fde68a'
        : (type === 'arabicRoot' || type === 'arabicForm') ? '#fbbf24'
        : type === 'lemma' ? '#c084fc'
        : type === 'morphPattern' ? '#fb923c'
        : type === 'semanticDomain' ? '#f472b6'
        : '#a7f3d0';
      ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
      ctx.fillText(text, 6, 38);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(w / 12, h / 12, 1);
      sprite.position.set(0, 7, 0);
      sprite.name = 'label';
      sprite.visible = false;
      return sprite;
    }

    // ── build Three.js object for a node ────────────────────────────────────────
    function buildNodeObj(node) {
      // Base verses (not yet touched by conversation): tiny dim sphere, no sprite
      if (node.type === 'verse' && !node.inConv && !node.active) {
        const geo  = new THREE.SphereGeometry(1.2, 5, 5);
        const col  = C_VERSE_IDLE.clone();
        const mat  = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.45 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name  = 'sphere';
        const g    = new THREE.Group();
        g.add(mesh);
        node.__obj = g;
        return g;
      }

      // Conversation / keyword nodes: full sphere + optional aura + label
      const isKw = node.type === 'keyword';
      const r    = isKw ? 2.5 : 4;
      const col  = nodeBaseColor(node);
      const group = new THREE.Group();

      const geo = new THREE.SphereGeometry(r, 14, 14);
      const mat = new THREE.MeshPhongMaterial({
        color: col.clone(), emissive: col.clone(),
        emissiveIntensity: node.active ? 0.85 : 0.15,
        transparent: true, opacity: node.active ? 1.0 : 0.75,
        shininess: 90,
      });
      const sphere = new THREE.Mesh(geo, mat);
      sphere.name = 'sphere';
      group.add(sphere);

      if (node.active) {
        const ag = new THREE.SphereGeometry(r * 2.4, 8, 8);
        const am = new THREE.MeshBasicMaterial({
          color: col.clone(), transparent: true, opacity: 0.10, side: THREE.BackSide,
        });
        const aura = new THREE.Mesh(ag, am);
        aura.name = 'aura';
        group.add(aura);
      }

      const sprite = makeSprite(node.label, node.type);
      // Labels always visible for active and conversation nodes
      sprite.visible = true;
      group.add(sprite);
      node.__obj = group;
      return group;
    }

    // ── refresh an existing node object in-place ─────────────────────────────────
    let hoveredNode = null;

    function refreshNode(node) {
      if (!node.__obj) return;

      // If this was a dim base node but is now in conversation, rebuild it properly
      const sphere = node.__obj.getObjectByName('sphere');
      const isFullNode = sphere && sphere.type === 'Mesh' &&
                         sphere.material.type === 'MeshPhongMaterial';
      const needsUpgrade = (node.inConv || node.active) &&
                           sphere && sphere.material.type === 'MeshBasicMaterial';

      if (needsUpgrade) {
        // Replace the simple mesh with the full node object
        // Remove all children
        while (node.__obj.children.length) {
          const c = node.__obj.children[0];
          node.__obj.remove(c);
          if (c.geometry) c.geometry.dispose();
          if (c.material) c.material.dispose();
        }
        // Re-add full geometry
        const isKw = node.type === 'keyword';
        const r    = isKw ? 2.5 : 4;
        const col  = nodeBaseColor(node);
        const geo  = new THREE.SphereGeometry(r, 14, 14);
        const mat  = new THREE.MeshPhongMaterial({
          color: col.clone(), emissive: col.clone(),
          emissiveIntensity: node.active ? 0.85 : 0.15,
          transparent: true, opacity: node.active ? 1.0 : 0.75,
          shininess: 90,
        });
        const newSphere = new THREE.Mesh(geo, mat);
        newSphere.name = 'sphere';
        node.__obj.add(newSphere);

        sp.visible = true;

          const am = new THREE.MeshBasicMaterial({

          });
          const aura = new THREE.Mesh(ag, am); aura.name = 'aura';
          node.__obj.add(aura);
        }
        return;

      const col = nodeBaseColor(node);
      if (sphere) {
        sphere.material.color.copy(col);
        if (sphere.material.emissive) {
          sphere.material.emissive.copy(col);
          sphere.material.emissiveIntensity = node.active ? 0.85 : 0.15;

    // ── pre-compute galaxy positions ─────────────────────────────────────────────
    // Each surah gets a center on a fibonacci sphere (radius 600).
    // Each surah's verses form a ring in the plane perpendicular to the radius.
    const GALAXY_POSITIONS = {};

    function fibSphere(i, n, R) {
      const phi   = Math.acos(1 - 2 * (i + 0.5) / n);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      return new THREE.Vector3(
        R * Math.sin(phi) * Math.cos(theta),
        R * Math.cos(phi),
        R * Math.sin(phi) * Math.sin(theta)
      );
    }

    // Two vectors perpendicular to 'dir'
    function perpFrame(dir) {
      const up = Math.abs(dir.y) < 0.9 ? new THREE.Vector3(0, 1, 0)
                                        : new THREE.Vector3(1, 0, 0);
      const u  = new THREE.Vector3().crossVectors(up, dir).normalize();
      const v  = new THREE.Vector3().crossVectors(dir, u).normalize();
      return { u, v };
    }

    function buildGalaxyPositions(verses) {
      // Group by surah
      const bySurah = {};
      for (const v of verses) {
        if (!bySurah[v.surah]) bySurah[v.surah] = [];
        bySurah[v.surah].push(v.id);
      }
      const surahNums = Object.keys(bySurah).map(Number).sort((a, b) => a - b);

      surahNums.forEach((sNum, si) => {
        const center = fibSphere(si, 114, 600);
        const dir    = center.clone().normalize();
        const { u, v } = perpFrame(dir);
        const ids    = bySurah[sNum];
        const n      = ids.length;
        // Ring radius scales with verse count (min 20, max 90)
        const ringR  = Math.min(20 + n * 0.55, 90);

        ids.forEach((id, vi) => {
          const angle = (vi / n) * 2 * Math.PI;
          const pos   = new THREE.Vector3()
            .addScaledVector(center, 1)
            .addScaledVector(u, Math.cos(angle) * ringR)
            .addScaledVector(v, Math.sin(angle) * ringR);
          GALAXY_POSITIONS[id] = pos;
        });
      });
    }

    // ── graph state ──────────────────────────────────────────────────────────────
    const gState = {
      nodeMap:   {},

    // ── build verse globe as a single THREE.Points (1 draw call, no blocking) ─────
    let pointCloud = null;
    const versePointIndex = {}; // verseId → index in buffer

    function buildVerseGlobe() {
      if (!Graph) return;
      const allVerses = [];
      SURAH_COUNTS.forEach((count, si) => {
        for (let v = 1; v <= count; v++) allVerses.push({ id: `${si+1}:${v}`, surah: si+1 });
      });
      buildGalaxyPositions(allVerses);

      const N = allVerses.length;
      const posArr = new Float32Array(N * 3);
      const colArr = new Float32Array(N * 3);
      allVerses.forEach((v, i) => {
        const p = GALAXY_POSITIONS[v.id];
        posArr[i*3] = p.x; posArr[i*3+1] = p.y; posArr[i*3+2] = p.z;
        versePointIndex[v.id] = i;
        const c = new THREE.Color().setHSL((v.surah - 1) / 114, 0.6, 0.18);
        colArr[i*3] = c.r; colArr[i*3+1] = c.g; colArr[i*3+2] = c.b;
      });

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      geo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));
      pointCloud = new THREE.Points(geo, new THREE.PointsMaterial({
        size: 2.2, vertexColors: true, transparent: true, opacity: 0.6, sizeAttenuation: true,
      }));
      Graph.scene().add(pointCloud);

      // Add surah label sprites exactly at each surah ring centre
      SURAH_DATA.forEach(([num, arabic, english], si) => {
        const center = fibSphere(si, 114, 600);
        const sprite = makeSurahSprite(num, arabic, english);
        sprite.position.copy(center);
        Graph.scene().add(sprite);
        surahLabelSprites.push({ sprite, pos: center.clone() });
      });

      Graph.graphData({ nodes: [], links: [] });
      Graph.cameraPosition({ x: 0, y: 0, z: 2000 }, { x: 0, y: 0, z: 0 }, 1500);
    }

    // Fade surah labels based on camera distance — visible from normal zoom
    (function animateSurahLabels() {
      requestAnimationFrame(animateSurahLabels);
      if (!Graph || surahLabelSprites.length === 0) return;
      const cam = Graph.camera();
      if (!cam) return;
      const camPos = cam.position;
      for (const { sprite, pos } of surahLabelSprites) {
        const dist = camPos.distanceTo(pos);
        // fully visible ≤ 800 units, fades to 0.15 at 1600+
        const t = 1 - Math.min(1, Math.max(0, (dist - 800) / 800));
        sprite.material.opacity = 0.15 + t * 0.80;
      }
    })();

    // ── apply conversation graph update ──────────────────────────────────────────
    function applyGraphUpdate(update) {
      // Deactivate previous active nodes
      gState.activeIds.forEach(id => {
        const n = gState.nodeMap[id];
        if (n) { n.active = false; refreshNode(n); }
      });
      gState.activeIds.clear();

      if (!Graph) return;
      const existing = Graph.graphData();
      const newLinks = [];

      for (const n of update.nodes) {
        // Pin verse nodes to their galaxy position so they stay on the sphere
        if (n.type === 'verse' && GALAXY_POSITIONS[n.id]) {
          const gp = GALAXY_POSITIONS[n.id];
          n.fx = gp.x; n.fy = gp.y; n.fz = gp.z;
        }
        // Pin keyword nodes near the centroid of their connected verses
        if (n.type === 'keyword') {
          const connectedVIds = update.links
            .filter(l => l.source === n.id || l.target === n.id)
            .map(l => l.source === n.id ? l.target : l.source);
          let cx = 0, cy = 0, cz = 0, count = 0;
          for (const vid of connectedVIds) {
            const gp = GALAXY_POSITIONS[vid];
            if (gp) { cx += gp.x; cy += gp.y; cz += gp.z; count++; }
          }
          if (count > 0) {
            n.fx = cx / count; n.fy = cy / count; n.fz = cz / count;
          }
        }

        const en = gState.nodeMap[n.id];
        if (en) {
          if (n.text)      en.text      = n.text;
          if (n.surahName) en.surahName = n.surahName;
          if (n.fx != null) { en.fx = n.fx; en.fy = n.fy; en.fz = n.fz; }
          if (!en.inConv) { en.inConv = true; refreshNode(en); }
        } else {
          gState.nodeMap[n.id] = n;
        }
      }

      const existIds = new Set(existing.nodes.map(n => n.id));
      const newNodes = update.nodes.filter(n => !existIds.has(n.id));

      for (const l of update.links) {
        const key = `${l.source}>${l.target}`;
        if (!gState.linkKeys.has(key)) { gState.linkKeys.add(key); newLinks.push(l); }
      }

      if (newNodes.length || newLinks.length) {
        Graph.graphData({
          nodes: [...existing.nodes, ...newNodes],
          links: [...existing.links, ...newLinks],
        });
      }

      setTimeout(() => {
        for (const id of update.active) {
          gState.activeIds.add(id);
          const n = gState.nodeMap[id] || Graph.graphData().nodes.find(n => n.id === id);
          if (n) { n.active = true; n.inConv = true; refreshNode(n); }
        }
      }, 80);
    }

    // ── clear conversation graph ─────────────────────────────────────────────────
    function clearGraph() {
      if (!Graph) return;
      // Reset all tracking state
      gState.activeIds.clear();
      gState.linkKeys.clear();
      gState.nodeMap = {};
      // Remove all conversation nodes/links, keep the point cloud
      Graph.graphData({ nodes: [], links: [] });
      // Hide node info card
      document.getElementById('node-info').style.display = 'none';
    }

    // ════════════════════════════════════════════════════════════════════════════
    // WASD CAMERA MOVEMENT
    // ════════════════════════════════════════════════════════════════════════════
    const keys = {};
    const MOVE_SPEED = 8;

    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      // Don't steal keys when typing in the input box
      if (document.activeElement === document.getElementById('input')) return;
      if (['w','a','s','d','q','e'].includes(e.key.toLowerCase())) e.preventDefault();
    });
    document.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

    // Focus graph panel on click so WASD works without extra click
    graphPanel.addEventListener('click', () => graphPanel.focus());
    graphPanel.setAttribute('tabindex', '0');

    function animateWASD() {
      requestAnimationFrame(animateWASD);

      const active = keys['w'] || keys['s'] || keys['a'] || keys['d'] || keys['q'] || keys['e'];
      if (!active) return;
      if (document.activeElement === document.getElementById('input')) return;

      if (!Graph) return;
      const cam = Graph.camera();
      if (!cam) return;

      // Forward vector (camera direction, projected — keep Y for free-fly)
      const dir = new THREE.Vector3();
      cam.getWorldDirection(dir);

      const right = new THREE.Vector3();
      right.crossVectors(dir, cam.up).normalize();

      const up = new THREE.Vector3(0, 1, 0);

      const delta = new THREE.Vector3();
      if (keys['w']) delta.addScaledVector(dir,   MOVE_SPEED);
      if (keys['s']) delta.addScaledVector(dir,  -MOVE_SPEED);
      if (keys['a']) delta.addScaledVector(right, -MOVE_SPEED);
      if (keys['d']) delta.addScaledVector(right,  MOVE_SPEED);
      if (keys['q']) delta.addScaledVector(up,    -MOVE_SPEED);
      if (keys['e']) delta.addScaledVector(up,     MOVE_SPEED);

      cam.position.add(delta);

      // Also move the orbit controls target so rotation stays centred
      const controls = Graph.controls();
      if (controls && controls.target) {
        controls.target.add(delta);
        controls.update();
      }
    }

    animateWASD();

    // ════════════════════════════════════════════════════════════════════════════
    // CHAT
    // ════════════════════════════════════════════════════════════════════════════
    let history     = [];
    let isStreaming = false;

    const messagesEl = document.getElementById('messages');
    function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addUserBubble(text) {
      const row = document.createElement('div'); row.className = 'row-user';
      const b   = document.createElement('div'); b.className = 'bubble-user';
      b.textContent = text; row.appendChild(b); messagesEl.appendChild(row);
      scrollBottom();
    }

    function createAssistantBubble() {
      const row    = document.createElement('div'); row.className = 'row-assistant';
      const bubble = document.createElement('div'); bubble.className = 'bubble-assistant';
      row.appendChild(bubble); messagesEl.appendChild(row); scrollBottom();

      const thinking = document.createElement('span');
      thinking.className = 'thinking'; thinking.textContent = 'Thinking...';
      bubble.appendChild(thinking);

      let thinkingGone  = false;
      let currentTextEl = null;
      let currentText   = '';
      const allTextEls  = [];

      function removeThinking() {
        if (!thinkingGone) { thinking.remove(); thinkingGone = true; }
      }
      function ensureTextEl() {
        if (!currentTextEl) {
          removeThinking();
          currentTextEl = document.createElement('div');
          currentTextEl.className = 'prose';
          bubble.appendChild(currentTextEl);
          allTextEls.push(currentTextEl);
        }
      }

      return {
        bubble,
        addText(delta) {
          ensureTextEl();
          currentText += delta;
          currentTextEl.innerHTML = marked.parse(currentText);
          scrollBottom();
        },
        addTool(name, args, summary) {
          removeThinking();
          currentTextEl = null; currentText = '';
          const d = document.createElement('details');
          d.className = 'tool-block';
          d.innerHTML = `<summary>${esc(name)} — <code>${esc(args)}</code></summary>`
                      + `<div class="tool-result">${esc(summary)}</div>`;
          bubble.appendChild(d); scrollBottom();
        },
        finalize(verses) {
          allTextEls.forEach(el => wrapVerseRefs(el, verses));
          scrollBottom();
        },
        addEtymologyPanel(tool, result) {
          removeThinking();
          currentTextEl = null; currentText = '';
          const panel = renderEtymologyPanel(tool, result);
          if (panel) { bubble.appendChild(panel); scrollBottom(); }
        },
        setError(msg) {
          removeThinking();
          const e = document.createElement('div');
          e.style.cssText = 'color:#f87171;font-size:0.82em;margin-top:4px';
          e.textContent = 'Error: ' + msg; bubble.appendChild(e);
        },
      };
    }

    // ── etymology panel renderers ─────────────────────────────────────────────
    function lookupWordInChat(word) {
      const inp = document.getElementById('input');
      if (inp) { inp.value = `Look up the word ${word}`; sendMessage(); }
    }

    function makeVrefSpan(vid) {
      const s = document.createElement('span');
      s.className = 'vref-link';
      s.textContent = `[${vid}]`;
      s.onclick = () => {
        const inp = document.getElementById('input');
        if (inp) { inp.value = `Show me verse ${vid}`; sendMessage(); }
      };
      return s;
    }

    function renderEtymologyPanel(tool, r) {
      if (!r || r.error) return null;
      const div = document.createElement('div');
      div.className = 'etym-panel';

      if (tool === 'lookup_word' && r.found) {
        const lem = r.lemmas && r.lemmas[0];
        if (!lem) return null;
        // Header
        div.innerHTML = `<div class="etym-panel-header">
          <span class="ar-main">${esc(lem.lemma || r.word)}</span>
          <span class="en-gloss">${esc(lem.rootGloss || '')}</span>
        </div>`;
        // Tags
        const tags = document.createElement('div');
        tags.style.marginBottom = '8px';
        if (lem.root) tags.innerHTML += `<span class="etym-tag etym-tag-root">Root: ${esc(lem.root)}</span>`;
        if (lem.pattern) tags.innerHTML += `<span class="etym-tag etym-tag-pattern">${esc(lem.pattern)}</span>`;
        if (lem.pos) tags.innerHTML += `<span class="etym-tag etym-tag-pos">${esc(lem.pos)}</span>`;
        tags.innerHTML += `<span class="etym-tag etym-tag-count">${r.total_occurrences} occurrences</span>`;
        if (lem.patternLabel) tags.innerHTML += `<div style="color:#94a3b8;font-size:0.82em;margin-top:4px">${esc(lem.meaningTendency || lem.patternLabel)}</div>`;
        div.appendChild(tags);
        // Occurrence list (group by surah)
        const bySurah = {};
        for (const occ of (lem.occurrences || [])) {
          const s = occ.verse_id.split(':')[0];
          bySurah[s] = (bySurah[s] || 0) + 1;
        }
        if (Object.keys(bySurah).length > 0) {
          const oDiv = document.createElement('div');
          oDiv.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:6px';
          for (const [s, c] of Object.entries(bySurah).sort((a,b) => b[1]-a[1]).slice(0, 20)) {
            const chip = document.createElement('span');
            chip.className = 'etym-tag etym-tag-count';
            chip.textContent = `Surah ${s}: ${c}`;
            oDiv.appendChild(chip);
          }
          div.appendChild(oDiv);
        }
        // Other lemmas
        if (r.lemmas.length > 1) {
          const more = document.createElement('div');
          more.style.cssText = 'margin-top:10px;padding-top:8px;border-top:1px solid #1e3a5f';
          more.innerHTML = '<div style="color:#475569;font-size:0.78em;margin-bottom:4px">Also found as:</div>';
          for (const l of r.lemmas.slice(1, 6)) {
            const row = document.createElement('div');
            row.className = 'etym-row';
            row.innerHTML = `<span class="ar" onclick="lookupWordInChat('${esc(l.lemma)}')">${esc(l.lemma)}</span>
              <span class="gloss">${esc(l.rootGloss || '')}</span>
              <span class="count">${(l.occurrences||[]).length} occ.</span>`;
            more.appendChild(row);
          }
          div.appendChild(more);
        }

      } else if (tool === 'explore_root_family' && r.found) {
        const root = r.root || {};
        div.innerHTML = `<div class="etym-panel-header">
          <span class="ar-main">${esc(root.root || '')}</span>
          <span class="en-gloss">${esc(root.gloss || '')} — ${root.verse_count || 0} verses</span>
        </div>`;
        // Domain tags
        const doms = r.semantic_domains || {};
        if (Object.keys(doms).length) {
          const dDiv = document.createElement('div');
          dDiv.style.marginBottom = '8px';
          for (const name of Object.values(doms)) {
            dDiv.innerHTML += `<span class="etym-tag etym-tag-domain">${esc(name)}</span>`;
          }
          div.appendChild(dDiv);
        }
        // Lemma rows
        for (const l of (r.lemmas || []).slice(0, 15)) {
          const row = document.createElement('div');
          row.className = 'etym-row';
          const patBadge = l.pattern ? `<span class="etym-tag etym-tag-pattern" style="font-size:0.7em">${esc(l.pattern)}</span>` : '';
          row.innerHTML = `<span class="ar" onclick="lookupWordInChat('${esc(l.lemma)}')">${esc(l.lemma)}</span>
            <span class="gloss">${esc(l.gloss || '')} ${patBadge}</span>
            <span class="count">${l.verse_count} verses</span>`;
          div.appendChild(row);
        }

      } else if (tool === 'get_verse_words' && r.found) {
        div.innerHTML = `<div class="etym-panel-header">
          <span style="color:#10b981;font-weight:700">[${esc(r.verse_id)}]</span>
          <span class="en-gloss">${esc(r.surah_name || '')}</span>
        </div>`;
        // Interlinear display
        const inter = document.createElement('div');
        inter.className = 'etym-interlinear';
        for (const w of (r.words || [])) {
          const col = document.createElement('div');
          col.className = 'etym-word-col';
          col.onclick = () => lookupWordInChat(w.arabic);
          col.innerHTML = `<span class="w-ar">${esc(w.arabic)}</span>
            <span class="w-gloss">${esc(w.root_gloss || w.lemma || '')}</span>
            <span class="w-root">${esc(w.root || '')}</span>
            <span class="w-pos">${esc(w.pos || '')}</span>`;
          inter.appendChild(col);
        }
        div.appendChild(inter);
        // Translation
        if (r.translation) {
          const tr = document.createElement('div');
          tr.style.cssText = 'color:#94a3b8;font-size:0.85em;margin-top:8px;padding-top:8px;border-top:1px solid #1e3a5f;font-style:italic';
          tr.textContent = r.translation;
          div.appendChild(tr);
        }

      } else if (tool === 'search_semantic_field' && r.found) {
        const dom = r.domain || {};
        div.innerHTML = `<div class="etym-panel-header">
          <span class="ar-main">${esc(dom.nameAr || '')}</span>
          <span class="en-gloss">${esc(dom.nameEn || '')} — ${esc(dom.description || '')}</span>
        </div>`;
        div.innerHTML += `<span class="etym-tag etym-tag-domain">${r.total_roots} roots in this domain</span>`;
        for (const rt of (r.roots || []).slice(0, 20)) {
          const row = document.createElement('div');
          row.className = 'etym-row';
          row.innerHTML = `<span class="ar" onclick="lookupWordInChat('${esc(rt.root)}')">${esc(rt.root)}</span>
            <span class="gloss">${esc(rt.gloss || '')}</span>
            <span class="count">${rt.verse_count} verses</span>`;
          div.appendChild(row);
        }

      } else if (tool === 'lookup_wujuh' && r.found) {
        div.innerHTML = `<div class="etym-panel-header">
          <span class="ar-main">${esc(r.root || '')}</span>
          <span class="en-gloss">${r.total_senses} distinct meanings in the Quran</span>
        </div>`;
        for (const [i, sense] of (r.senses || []).entries()) {
          const sd = document.createElement('div');
          sd.className = 'etym-sense';
          let html = `<span class="etym-sense-num">${i+1}.</span>`;
          html += `<span class="etym-sense-meaning">${esc(sense.meaning_en)}</span>`;
          if (sense.meaning_ar) html += ` <span class="etym-sense-meaning-ar">${esc(sense.meaning_ar)}</span>`;
          sd.innerHTML = html;
          // Sample verse refs
          const vDiv = document.createElement('div');
          vDiv.className = 'etym-sense-verses';
          for (const sv of (sense.sample_verses || []).slice(0, 4)) {
            vDiv.appendChild(makeVrefSpan(sv.verse_id));
            vDiv.appendChild(document.createTextNode(' '));
          }
          sd.appendChild(vDiv);
          div.appendChild(sd);
        }

      } else if (tool === 'search_morphological_pattern' && r.found) {
        const pat = r.pattern || r.pos || r.verb_form || '';
        div.innerHTML = `<div class="etym-panel-header">
          <span class="ar-main">${esc(pat)}</span>
          <span class="en-gloss">${r.total_distinct_words} distinct words</span>
        </div>`;
        for (const rt of (r.by_root || []).slice(0, 15)) {
          const row = document.createElement('div');
          row.className = 'etym-row';
          const wordList = (rt.words || []).slice(0, 3).map(w =>
            `<span class="ar" style="font-size:1em;min-width:auto;cursor:pointer" onclick="lookupWordInChat('${esc(w.lemma || w.arabic)}')">${esc(w.arabic)}</span>`
          ).join(' ');
          row.innerHTML = `<span style="color:#f59e0b;min-width:40px">${esc(rt.root)}</span>
            <span style="display:flex;gap:8px;direction:rtl">${wordList}</span>
            <span class="gloss" style="flex:1">${esc(rt.gloss || '')}</span>
            <span class="count">${(rt.words||[]).reduce((a,w)=>a+w.occurrences,0)}×</span>`;
          div.appendChild(row);
        }

      } else {
        return null;
      }
      return div;
    }

    // ── verse tooltip ────────────────────────────────────────────────────────────
    const VREF_SPLIT = /(\[\d+:\d+\])/;
    const VREF_MATCH = /^\[(\d+:\d+)\]$/;
    // Expand "[26:108, 26:110, 26:126]" → "[26:108] [26:110] [26:126]"
    const VREF_LIST = /\[(\d+:\d+(?:\s*,\s*\d+:\d+)+)\]/g;
    function expandVrefLists(text) {
      return text.replace(VREF_LIST, (_, inner) =>
        inner.split(/\s*,\s*/).map(r => `[${r}]`).join(' ')
      );
    }

    function wrapVerseRefs(container, verses) {
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
      const targets = [];
      let node;
      while ((node = walker.nextNode())) {
        if (/\[\d+:\d+/.test(node.textContent)) targets.push(node);
      }
      targets.forEach(tn => {
        const expanded = expandVrefLists(tn.textContent);
        const parts = expanded.split(VREF_SPLIT);
        if (parts.length <= 1) return;
        const frag = document.createDocumentFragment();
        parts.forEach(part => {
          const m = part.match(VREF_MATCH);
          if (m) {
            const span = document.createElement('span');
            span.className = 'vref'; span.textContent = part;
            span.dataset.vid = m[1];
            const vdata = verses[m[1]];
            if (typeof vdata === 'object' && vdata) {
              span.dataset.v = vdata.text || '';
              span.dataset.ar = vdata.arabic || '';
            } else {
              span.dataset.v = vdata || '';
              span.dataset.ar = '';
            }
            frag.appendChild(span);
          } else if (part) {
            frag.appendChild(document.createTextNode(part));
          }
        });
        tn.parentNode.replaceChild(frag, tn);
      });
    }

    const tooltip      = document.getElementById('tooltip');
    const tooltipRef   = document.getElementById('tooltip-ref');
    const tooltipAr    = document.getElementById('tooltip-arabic');
    const tooltipText  = document.getElementById('tooltip-text');

    document.addEventListener('mouseover', e => {
      const el = e.target.closest('.vref');
      if (!el || !el.dataset.v) return;
      tooltipRef.textContent  = el.dataset.vid;
      tooltipAr.textContent   = el.dataset.ar || '';
      tooltipText.textContent = el.dataset.v;
      tooltip.style.display   = 'block';
      tooltip.style.visibility = 'hidden';
      const r  = el.getBoundingClientRect();
      const tw = Math.min(340, window.innerWidth - 16);
      tooltip.style.maxWidth = tw + 'px';
      const th = tooltip.offsetHeight;
      tooltip.style.visibility = '';
      let left = r.left + r.width / 2 - tw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
      tooltip.style.left = left + 'px';
      tooltip.style.top  = (r.top - th - 8 < 8 ? r.bottom + 8 : r.top - th - 8) + 'px';
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest('.vref')) tooltip.style.display = 'none';
    });

    // ── send ─────────────────────────────────────────────────────────────────────
    async function sendMessage() {
      const inputEl = document.getElementById('input');
      const message = inputEl.value.trim();
      if (!message || isStreaming) return;

      inputEl.value = ''; isStreaming = true;
      document.getElementById('send-btn').disabled = true;
      examplesEl.style.display = 'none';

      addUserBubble(message);
      history.push({ role: 'user', content: message });

      const { bubble: currentBubble, addText, addTool, addEtymologyPanel, finalize, setError } = createAssistantBubble();
      let fullText = '';

      try {
        const resp = await fetch('/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: history.slice(0, -1) }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const reader = resp.body.getReader();
        const dec    = new TextDecoder();
        let   buf    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let ev;
            try { ev = JSON.parse(line.slice(6)); } catch { continue; }

            if (ev.t === 'text') {
              fullText += ev.d; addText(ev.d);
            } else if (ev.t === 'tool') {
              addTool(ev.name, ev.args, ev.summary);
            } else if (ev.t === 'etymology_panel') {
              addEtymologyPanel(ev.tool, ev.result);
            } else if (ev.t === 'graph_update') {
              applyGraphUpdate(ev);
            } else if (ev.t === 'retry') {
              // Re-generated response with better citations — replace content
              fullText = ev.d;
              if (currentBubble) {
                const body = currentBubble.querySelector('.bubble-body');
                if (body) body.innerHTML = renderMarkdown(expandVrefLists(ev.d));
              }
            } else if (ev.t === 'uncertainty') {
              if (currentBubble && ev.d && ev.d.confidence === 'low') {
                const uc = document.createElement('div');
                uc.style.cssText = 'font-size:0.72em;padding:3px 10px;border-radius:10px;margin-bottom:6px;display:inline-block;background:rgba(239,68,68,0.12);color:#ef4444;';
                uc.textContent = `Low confidence — responses varied (entropy: ${ev.d.entropy})`;
                currentBubble.insertBefore(uc, currentBubble.firstChild);
              }
            } else if (ev.t === 'verification') {
              if (currentBubble && ev.d) {
                const v = ev.d;
                const badge = document.createElement('div');
                badge.style.cssText = 'font-size:0.72em;padding:3px 10px;border-radius:10px;margin-top:6px;display:inline-block;';
                if (v.citation_precision >= 0.7) {
                  badge.style.background = 'rgba(16,185,129,0.12)';
                  badge.style.color = '#10b981';
                  badge.textContent = `${v.supported}/${v.total_citations_checked} citations verified`;
                } else {
                  badge.style.background = 'rgba(245,158,11,0.12)';
                  badge.style.color = '#f59e0b';
                  badge.textContent = `${v.flagged_count} citation(s) need review (${v.supported}/${v.total_citations_checked} verified)`;
                }
                currentBubble.appendChild(badge);
              }
            } else if (ev.t === 'warning') {
              if (currentBubble) {
                const warn = document.createElement('div');
                warn.style.cssText = 'font-size:0.72em;padding:3px 10px;border-radius:10px;margin-top:6px;display:inline-block;background:rgba(245,158,11,0.12);color:#f59e0b;';
                warn.textContent = ev.d;
                currentBubble.appendChild(warn);
              }
            } else if (ev.t === 'done') {
              finalize(ev.verses || {});
              history.push({ role: 'assistant', content: fullText });
            } else if (ev.t === 'error') {
              setError(ev.d);
            }
          }
        }
      } catch (err) {
        setError(err.message);
      }

      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      inputEl.focus();
    }

    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
