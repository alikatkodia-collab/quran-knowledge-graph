# Eval v2 — ABSTRACT bucket (25 questions).
#
# Tests thematic / conceptual questions with no proper nouns. Real-user
# shape: open-ended "what does the Quran say about X" prompts where X
# is a virtue, vice, or theological concept. Failure mode: agent
# semantic-searches and returns thematically-adjacent verses without
# anchoring in high-confidence keyword hits.
#
# 10 questions are flagged [AR] in notes — these expect Arabic-root
# augmentation (root substring required + search_arabic_root tool call).
# The agent-side behaviour change that produces this augmentation
# is being implemented in a parallel session; until it ships, [AR]
# questions will score low, which is the intended baseline signal.

- id: abstract-001
  bucket: ABSTRACT
  question: "Tell me what the Quran says about charity."
  asserts:
    cites_must_include: ["2:177"]
    tools_used_must_include: ["concept_search"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["charity"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.4
    tool_path_correctness: 0.2
    framing_appropriateness: 0.15
  notes: |
    Theme: charity. Routing: ABSTRACT lane -> concept_search first
    (per system prompt). run_cypher forbidden as long-tail escape
    hatch — should not fire on a thematic query. tool_path weight
    nudged to 0.2 because tool-lane discipline is exactly what this
    bucket tests.
    Anchor candidates considered: 2:177 (definitional Khalifa
    "righteousness" verse, defines charity to relatives / orphans /
    needy), 9:103 (Khalifa: take from their money a charity to
    purify them), 2:267 (give from the good of what you earn).
    Picked 2:177 as most canonical. Promote to any_of cluster in
    Phase 4d if it proves brittle.
  added: 2026-05-17
  added_by: operator

- id: abstract-002
  bucket: ABSTRACT
  question: "What does the Quran teach about forgiveness?"
  asserts:
    cites_must_include: ["39:53"]
    tools_used_must_include: ["concept_search"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["forgive"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.4
    tool_path_correctness: 0.2
    framing_appropriateness: 0.15
  notes: |
    Theme: forgiveness (bidirectional — divine and interpersonal).
    Required substring is "forgive" (matches "forgives" / "forgiving"
    / "forgiveness" via prefix). Failure mode: agent only covers
    divine forgiveness and misses interpersonal dimension.
    Anchor candidates considered: 39:53 (Khalifa: "Never despair of
    God's mercy. God forgives all sins" — most iconic), 42:40
    (those who pardon and reform), 7:199 (be tolerant / overlook).
    Picked 39:53 as most canonical single anchor. Promote to
    any_of cluster in Phase 4d if it proves brittle.
  added: 2026-05-17
  added_by: operator

- id: abstract-003
  bucket: ABSTRACT
  question: "How does the Quran portray gratitude?"
  asserts:
    cites_must_include: ["14:7"]
    tools_used_must_include: ["concept_search", "search_arabic_root"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["thank", "shukr", "ش-ك-ر"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.4
    tool_path_correctness: 0.2
    framing_appropriateness: 0.15
  notes: |
    Theme: gratitude. [AR] root ش-ك-ر / shukr.
    Required substrings: "thank" (Khalifa renders shukr as
    "thank/appreciate") AND "shukr" (the AR augmentation signal).
    Until the parallel system-prompt change for Arabic augmentation
    lands, this question will fail on the search_arabic_root tool
    requirement and on the "shukr" substring — that's the intended
    baseline signal.
    Anchor candidates considered: 14:7 (Khalifa: "The more you thank
    Me, the more I give you" — most iconic), 2:152 ("remember Me
    and be thankful to Me"), 31:12 (Luqman's wisdom on gratitude).
    Picked 14:7 as most canonical. Promote to any_of cluster in
    Phase 4d if it proves brittle.
  added: 2026-05-17
  added_by: operator

- id: abstract-004
  bucket: ABSTRACT
  question: "Describe what the Quran reveals about sin."
  asserts:
    cites_must_include: ["4:31"]
    tools_used_must_include: ["concept_search"]
    tools_used_must_not_include: ["run_cypher"]
    answer_substring_required: ["sin"]
  rubric_weights:
    citation_accuracy: 0.25
    answer_completeness: 0.4
    tool_path_correctness: 0.2
    framing_appropriateness: 0.15
  notes: |
    Theme: sin (Khalifa distinguishes "gross sins" from minor offenses).
    Failure mode: answer treats all sin uniformly without surfacing
    the major/minor distinction central to Khalifa's framing.
    Anchor candidates considered: 4:31 (Khalifa: "If you refrain from
    committing the gross sins... we will remit your sins" — cleanest
    statement of the major/minor divide), 53:32 (those who avoid
    gross sins... except for minor offenses), 42:37 (avoid gross
    sins and vice). Picked 4:31 as most canonical. Promote to
    any_of cluster in Phase 4d if it proves brittle.
  added: 2026-05-17
  added_by: operator

